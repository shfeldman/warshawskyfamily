<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Warshawsky Family Tree</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #f5f0e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    padding: 2.5rem 3rem;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .founders-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 1.2rem;
    border: 3px solid #c8b06a;
  }
  h1 {
    font-size: 1.5rem;
    color: #2c1810;
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 0.95rem;
    color: #7a6a55;
    margin-bottom: 2rem;
  }
  label {
    display: block;
    text-align: left;
    font-size: 0.9rem;
    color: #4a3f33;
    margin-bottom: 0.4rem;
    font-weight: 600;
  }
  input[type="password"] {
    width: 100%;
    padding: 0.75rem 1rem;
    font-size: 1.1rem;
    border: 2px solid #d4c5a9;
    border-radius: 8px;
    margin-bottom: 1rem;
    background: #faf8f4;
    color: #2c1810;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: #8a6d1f; }
  .remember-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
    text-align: left;
  }
  .remember-row input { width: auto; margin: 0; }
  .remember-row label { margin: 0; font-weight: 400; color: #7a6a55; }
  button {
    width: 100%;
    padding: 0.85rem;
    font-size: 1.05rem;
    font-family: inherit;
    background: #8a6d1f;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.03em;
    transition: background 0.2s;
  }
  button:hover { background: #6e5618; }
  .error {
    color: #c0392b;
    font-size: 0.9rem;
    margin-top: 0.8rem;
    display: none;
  }
  .hint {
    margin-top: 1.5rem;
    font-size: 0.78rem;
    color: #b0a090;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Warshawsky Family Tree</h1>
  <p class="subtitle">Members only &mdash; please enter the family password</p>
  <label for="pwd">Password</label>
  <input type="text" id="pwd" placeholder="Enter family password" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off">
  <div class="remember-row">
    <input type="checkbox" id="remember" checked>
    <label for="remember">Remember me on this device</label>
  </div>
  <button onclick="unlock()">Enter Family Tree</button>
  <div class="error" id="err">Incorrect password &mdash; please try again.</div>
  <p class="hint">Contact a family member if you need the password.</p>
</div>

const STORAGE_KEY = 'wfc_pwd';

// ── Password input: show last typed character briefly, then mask ──────────
let realPwd = '';
let peekTimer = null;
const DOT = '•'; // •

function showMasked() {
  document.getElementById('pwd').value = DOT.repeat(realPwd.length);
}

function showPeek() {
  clearTimeout(peekTimer);
  document.getElementById('pwd').value = DOT.repeat(Math.max(0, realPwd.length - 1)) + realPwd.slice(-1);
  peekTimer = setTimeout(showMasked, 800);
}

document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') return; // handled separately
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'a') { realPwd = ''; showMasked(); e.preventDefault(); }
    else if (e.key === 'v') {
      // Paste: read clipboard then append
      navigator.clipboard && navigator.clipboard.readText().then(text => {
        realPwd += text;
        showPeek();
      }).catch(() => {});
      e.preventDefault();
    }
    return;
  }
  if (e.key === 'Backspace') {
    realPwd = realPwd.slice(0, -1);
    showMasked();
    e.preventDefault();
  } else if (e.key === 'Delete') {
    realPwd = '';
    showMasked();
    e.preventDefault();
  } else if (e.key.length === 1) {
    realPwd += e.key;
    showPeek();
    e.preventDefault();
  }
});

// ── Core decrypt ──────────────────────────────────────────────────────────
function hexToBytes(hex) {
  const b = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2) b[i/2] = parseInt(hex.substr(i,2),16);
  return b;
}

async function tryDecrypt(pwd) {
  const { ct, salt, iv } = ENCRYPTED;
  const enc = new TextEncoder();
  const mat = await crypto.subtle.importKey('raw', enc.encode(pwd), {name:'PBKDF2'}, false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:hexToBytes(salt), iterations:200000, hash:'SHA-256'},
    mat, {name:'AES-CBC',length:256}, false, ['decrypt']
  );
  const plain = await crypto.subtle.decrypt({name:'AES-CBC',iv:hexToBytes(iv)}, key, hexToBytes(ct));
  const text = new TextDecoder().decode(plain);
  if (text.includes('<!DOCTYPE') || text.includes('<html')) return text;
  return null;
}

// ── Render decrypted page ─────────────────────────────────────────────────
// document.write() is blocked by Chrome after page load — instead we parse
// the HTML, replace head/body, then re-create each <script> so they execute.
function render(html) {
  const parser = new DOMParser();
  const newDoc = parser.parseFromString(html, 'text/html');
  document.head.innerHTML = newDoc.head.innerHTML;
  document.body.innerHTML = newDoc.body.innerHTML;
  // innerHTML doesn't run scripts — re-create them so they execute in order
  const scripts = Array.from(document.body.querySelectorAll('script'));
  function runNext(i) {
    if (i >= scripts.length) return;
    const old = scripts[i];
    const s = document.createElement('script');
    Array.from(old.attributes).forEach(a => s.setAttribute(a.name, a.value));
    s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
    // if script has src, wait for it to load before running the next one
    if (s.src) { s.onload = s.onerror = () => runNext(i + 1); }
    else { runNext(i + 1); }
  }
  runNext(0);
}

// ── Show loading overlay immediately (before slow PBKDF2) ────────────────
function showLoading() {
  document.body.innerHTML = '<div style="font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:1.2rem;color:#8a6d1f;">Opening family tree…</div>';
}

// ── Unlock from typed password ────────────────────────────────────────────
async function unlock() {
  const pwd = realPwd.trim();
  if (!pwd) return;
  showLoading();
  try {
    const html = await tryDecrypt(pwd);
    if (html) {
      const remember = document.getElementById('remember') && document.getElementById('remember').checked;
      if (remember) {
        const exp = Date.now() + 30*24*60*60*1000;
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify({pwd, exp})); } catch(e){}
      }
      render(html);
    } else {
      location.reload(); // wrong password — restore gate
    }
  } catch(e) {
    location.reload();
  }
}

document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); }, true);
document.querySelector('button').addEventListener('click', unlock);

// ── Remember-me: stored password ─────────────────────────────────────────
(function() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const {pwd, exp} = JSON.parse(saved);
    if (exp && Date.now() > exp) { localStorage.removeItem(STORAGE_KEY); return; }
    showLoading();
    tryDecrypt(pwd).then(html => { if(html) render(html); else { localStorage.removeItem(STORAGE_KEY); location.reload(); }}).catch(() => location.reload());
  } catch(e) {}
})();

// ── URL bypass: bookmark https://warshawskyfamily.com#open:PASSWORD ───────
(function() {
  const hash = window.location.hash;
  if (!hash.startsWith('#open:')) return;
  const bypass = decodeURIComponent(hash.slice(6));
  if (!bypass) return;
  showLoading();
  tryDecrypt(bypass).then(html => { if(html) render(html); else location.reload(); }).catch(() => location.reload());
})();
